<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Bielik-11B-v3 vs Qwen3.5-9B | Slayer</title>
  <meta name="description" content="Wyniki na żywo: Bielik-11B-v3 vs Qwen3.5-9B na 10 benchmarkach. Autonomiczna kolejka, czysty pomiar.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/lab.css">
  <style>
    .top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .top h1{margin:10px 0 0;font-family:var(--disp);font-size:clamp(1.9rem,4.4vw,3rem);font-weight:700;letter-spacing:.02em;text-transform:uppercase}
    .upd{font-family:var(--mono);font-size:.76rem;color:var(--dim);margin:4px 0 0}
    .board{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(16px,5vw,48px);margin:24px 0;padding:24px clamp(16px,4vw,32px);border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--bg2))}
    .team{text-align:center}.team .tg{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}.team .nm{font-weight:500;font-size:clamp(1rem,2.2vw,1.4rem);margin-top:5px}
    .cnt{display:flex;align-items:baseline;gap:14px;font-family:var(--mono);font-weight:600;font-size:clamp(2.6rem,9vw,4.4rem);line-height:1}
    .cnt .b{color:var(--acc)}.cnt .q{color:var(--mut)}.cnt .d{color:var(--dim);font-weight:400}
    .bfoot{grid-column:1/-1;border-top:1px solid var(--line2);margin-top:16px;padding-top:14px;text-align:center;font-family:var(--mono);font-size:.78rem;color:var(--mut)}.bfoot b{color:var(--acc)}
    @media(max-width:760px){.board{grid-template-columns:1fr;gap:16px}}
  </style>
</head>
<body>
  <div id="site-nav"></div>
  <div class="sec page-top">
    <div class="inner">
      <div class="top">
        <div><span class="kick"><span class="ac">LEADERBOARD</span> — bielik vs qwen3.5-9b</span><h1>Wyniki na żywo</h1></div>
        <span class="live"><span class="d"></span>LIVE · AUTO-SYNC</span>
      </div>
      <p class="upd" id="updated">wczytuję…</p>
      <div class="board">
        <div class="team"><div class="tg">punkt odniesienia</div><div class="nm">Bielik-11B-v3</div></div>
        <div class="cnt"><span class="b" id="sb">0</span><span class="d">:</span><span class="q" id="sq">0</span></div>
        <div class="team"><div class="tg">challenger</div><div class="nm">Qwen3.5-9B</div></div>
        <div class="bfoot" id="bfoot">—</div>
      </div>
      <div id="content"></div>
      <div class="note"><p class="muted" id="note" style="margin:0;font-size:.9rem"></p></div>
    </div>
  </div>
  <div id="site-foot"></div>
  <script src="/assets/site.js"></script>
  <script>
    const NB="Bielik-11B-v3.0-Instruct",NQ="Qwen3.5-9B";
    const PRIMARY={poquad:"judged_accuracy",llmzszl:"accuracy",belebele:"accuracy",pes:"accuracy",flores:"chrf_overall",include:"accuracy",belebele_en:"accuracy",mmlu:"accuracy",arc:"accuracy",gsm8k:"accuracy"};
    const LABEL={llmzszl:"LLMzSzŁ",pes:"PES (medyczny)",include:"INCLUDE-44 (PL)",belebele:"Belebele (PL)",poquad:"PoQuAD",flores:"FLORES-200 (PL↔EN)",belebele_en:"Belebele (EN)",arc:"ARC-C (EN)",mmlu:"MMLU (EN)",gsm8k:"GSM8K (EN)"};
    const v=(p,n)=>{const k=PRIMARY[p.benchmark]||"accuracy";const m=(p.models||[]).find(x=>x.display_name===n);return m?m[k]:null;};
    function render(d){
      const b=d.tally?.[NB]??0,q=d.tally?.[NQ]??0,SB=document.getElementById("sb"),SQ=document.getElementById("sq");
      SB.textContent=b;SQ.textContent=q;SB.style.color=b>=q&&b>0?"var(--acc)":"";SQ.style.color=q>b?"var(--sec)":"var(--mut)";
      document.getElementById("updated").textContent="aktualizacja: "+(d.generated_at||"—")+" · źródło: simp (RTX 3090)";
      document.getElementById("bfoot").innerHTML=`<b>${b} : ${q}</b> po ${(d.benchmarks||[]).length} benchmarkach`;
      const bs=d.benchmarks||[],c=document.getElementById("content");
      if(!bs.length){c.innerHTML='<div class="tbl"><div style="padding:40px;text-align:center" class="muted mono">kolejka wystartowała — pierwsze wyniki za kilkanaście minut</div></div>';return;}
      let rows="";
      for(const p of bs){
        const vb=v(p,NB),vq=v(p,NQ),wb=p.winner===NB&&p.margin>0,wq=p.winner===NQ&&p.margin>0,runs=p.runs>1?` · ${p.runs} runów`:"";
        const verdict=(vb!=null&&vq!=null)?(wb?`<span class="vb b">▲ Bielik +${p.margin}</span>`:wq?`<span class="vb q">Qwen +${p.margin}</span>`:'<span class="vb pend">remis</span>'):'<span class="vb pend">w toku</span>';
        const sub=k=>p.mean_across_runs?.[k]&&p.runs>1?`<span class="sub">śr ${p.mean_across_runs[k]}</span>`:"";
        rows+=`<tr><td><div class="dn">${LABEL[p.benchmark]||p.benchmark}</div><div class="ds">${p.metric||""} · n=${p.n}${runs}</div></td><td class="s ${wb?'win':''}">${vb??'—'}${sub(NB)}</td><td class="s ${wq?'win q':''}">${vq??'—'}${sub(NQ)}</td><td class="c">${verdict}</td></tr>`;
      }
      c.innerHTML=`<div class="tbl"><table><thead><tr><th>Benchmark</th><th class="c">Bielik-11B-v3</th><th class="c">Qwen3.5-9B</th><th class="c">Wynik</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      document.getElementById("note").innerHTML="Metryka per benchmark: accuracy (MCQ), trafność sędziego-LLM (PoQuAD), chrF (FLORES). Polski rdzeń + kontrola regresji EN. Wszystko publiczne, deterministyczne, liczone czysto. <a href='/benchmarks' style='color:var(--acc)'>metodologia →</a>";
    }
    function load(){fetch("/results/leaderboard.json?ts="+Date.now()).then(r=>r.json()).then(render).catch(()=>{document.getElementById("content").innerHTML='<div class="tbl"><div style="padding:40px;text-align:center" class="muted mono">brak danych — odśwież</div></div>';});}
    load();setInterval(load,45000);
  </script>
</body>
</html>
